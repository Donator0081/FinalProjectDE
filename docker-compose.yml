version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: de_postgres
    environment:
      POSTGRES_USER: de_user
      POSTGRES_PASSWORD: de_pass
      POSTGRES_DB: movies
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U de_user -d movies"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-init:
    image: apache/airflow:2.9.1
    container_name: airflow_init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://de_user:de_pass@postgres/movies
    command: >
      bash -c "
      airflow db init &&
      airflow users create --username admin --password admin --firstname admin --lastname admin --role Admin --email admin@mail.com
      "
    restart: on-failure

  airflow-webserver:
    image: apache/airflow:2.9.1
    container_name: airflow_webserver
    depends_on:
      - airflow-init
      - postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://de_user:de_pass@postgres/movies
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./dbt:/opt/dbt
      - airflow_logs:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8080:8080"
    entrypoint: >
      /bin/bash -c "
      rm -rf /opt/airflow/logs/* &&
      airflow db migrate &&
      airflow webserver
      "
    restart: always

  airflow-scheduler:
    image: apache/airflow:2.9.1
    container_name: airflow_scheduler
    depends_on:
      - airflow-init
      - postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://de_user:de_pass@postgres/movies
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./dbt:/opt/dbt
      - airflow_logs:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: >
      /bin/bash -c "
      rm -rf /opt/airflow/logs/* &&
      airflow db migrate &&
      airflow scheduler
      "
    restart: always

  dbt:
    image: nomcebon/dbt-postgres:v1.0.2
    container_name: de_dbt
    volumes:
      - ./dbt/movie_dbt:/usr/app
    working_dir: /usr/app
    command: sleep infinity

  metabase:
    image: metabase/metabase:latest
    container_name: de_metabase
    ports:
      - "3000:3000"
    depends_on:
      - postgres

  ingestion:
    build: ./ingestion
    container_name: de_ingestion
    volumes:
      - ./ingestion:/app
      - ./data:/data
    working_dir: /app
    command: sleep infinity

volumes:
  postgres_data:
  airflow_logs:
